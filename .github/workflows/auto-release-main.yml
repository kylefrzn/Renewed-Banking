name: Auto Build + Release on Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0
        with:
          version: 9

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"
          cache-dependency-path: "web/pnpm-lock.yaml"

      - name: Install web dependencies
        run: pnpm i --frozen-lockfile
        working-directory: web

      - name: Build web UI
        run: pnpm build
        working-directory: web
        env:
          CI: true

      - name: Create release metadata
        run: |
          echo "RELEASE_TAG=main-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=Main Build ${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "RELEASE_ASSET=${{ github.event.repository.name }}-${GITHUB_SHA::7}.zip" >> "$GITHUB_ENV"

      - name: Bundle files
        run: |
          mkdir -p ./temp/${{ github.event.repository.name }}
          mkdir -p ./temp/${{ github.event.repository.name }}/web
          cp ./{README.md,LICENSE,config.lua,fxmanifest.lua,Renewed-Banking.sql} ./temp/${{ github.event.repository.name }}
          cp -r ./{client,locales,server} ./temp/${{ github.event.repository.name }}
          cp -r ./web/public ./temp/${{ github.event.repository.name }}/web/public
          cd ./temp
          zip -r ../$RELEASE_ASSET ./${{ github.event.repository.name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          generate_release_notes: true
          files: ${{ env.RELEASE_ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
